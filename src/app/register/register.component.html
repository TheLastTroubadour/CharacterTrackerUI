<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <h3 class="card-title mb-4 text-center">Create Account</h3>

      <div *ngIf="error" class="alert alert-danger">{{error}}</div>

      <form [formGroup]="registerForm" (ngSubmit)="register()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" formControlName="username" type="text" placeholder="Choose a username">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" formControlName="email" type="email" placeholder="Enter email">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" formControlName="password" type="password" placeholder="Min. 6 characters">
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid">Register</button>
      </form>

      <hr>
      <p class="text-center mb-0 text-muted">
        Already have an account? <a routerLink="/login">Log In</a>
      </p>
    </div>
  </div>
</div>
