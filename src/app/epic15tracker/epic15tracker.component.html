<h2 class="mb-3">Epic 1.5 Tracker</h2>

<ng-container *ngIf="epic1_5Quests$ | async as quests; else loading">
  <div *ngIf="error" class="alert alert-danger">{{error}}</div>
  <p *ngIf="!error && quests.length === 0" class="text-muted fst-italic">No Epic 1.5 quests found.</p>
  <div *ngIf="quests.length > 0" class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped table-hover table-sm mb-0">
        <thead class="table-dark">
          <tr>
            <th>Character</th>
            <th>Completed</th>
            <th>1st Stone</th>
            <th>2nd Stone</th>
            <th>3rd Stone</th>
            <th>4th Stone</th>
            <th>Flawless UH</th>
            <th>Perfect UH</th>
            <th>Total UH</th>
            <th>Absurd UH</th>
            <th>EOT Terrorantula</th>
            <th>EOT Spectre</th>
            <th>EOT Vampire</th>
            <th>EOT Ghost</th>
            <th>Blood of the Dragon</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of quests; let i=index">
            <td class="fw-semibold">{{e.character.name}}</td>
            <td class="text-center"><input type="checkbox" [(ngModel)]="e.completed" [disabled]="true"></td>
            <td class="text-center"><input type="checkbox" [(ngModel)]="e.firstStone.inInventory" [disabled]="true"></td>
            <td class="text-center"><input type="checkbox" [(ngModel)]="e.secondStone.inInventory" [disabled]="true"></td>
            <td class="text-center"><input type="checkbox" [(ngModel)]="e.thirdStone.inInventory" [disabled]="true"></td>
            <td class="text-center"><input type="checkbox" [(ngModel)]="e.fourthStone.inInventory" [disabled]="true"></td>
            <td class="text-center"><input type="checkbox" [(ngModel)]="e.flawlessUnicornHeart.inInventory" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.perfectUnicornHeart.inInventory" type="checkbox" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.totalUnicornHeart.inInventory" type="checkbox" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.absurdUnicornHeart.inInventory" type="checkbox" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.eyeOfTheTerrorantula.inInventory" type="checkbox" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.eyeOfTheSpectre.inInventory" type="checkbox" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.eyeOfTheVampire.inInventory" type="checkbox" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.eyeOfTheGhost.inInventory" type="checkbox" [disabled]="true"></td>
            <td class="text-center"><input [(ngModel)]="e.bloodOfTheDragon.inInventory" type="checkbox" [disabled]="true"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</ng-container>

<ng-template #loading>
  <div class="d-flex justify-content-center my-4">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</ng-template>
