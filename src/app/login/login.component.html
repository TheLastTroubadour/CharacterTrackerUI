<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <h3 class="card-title mb-4 text-center">EQ Character Tracker</h3>

      <div *ngIf="error" class="alert alert-danger">{{error}}</div>

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" formControlName="username" type="text" placeholder="Enter username" autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" formControlName="password" type="password" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">Log In</button>
      </form>

      <hr>
      <p class="text-center mb-0 text-muted">
        Don't have an account? <a routerLink="/register">Register</a>
      </p>
    </div>
  </div>
</div>
