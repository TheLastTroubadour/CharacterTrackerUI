<h2 class="mb-3">Armor Search</h2>

<div class="card shadow-sm mb-3">
  <div class="card-body">

    <div class="mb-3">
      <h6 class="text-muted text-uppercase fw-semibold mb-2">Server</h6>
      <select class="form-select w-auto" [(ngModel)]="selectedServer">
        <option value="">All Servers</option>
        <option *ngFor="let s of serverTypes" [value]="s">{{s}}</option>
      </select>
    </div>

    <div class="mb-3">
      <h6 class="text-muted text-uppercase fw-semibold mb-2">Armor Type</h6>
      <div class="d-flex flex-wrap gap-3">
        <div class="form-check">
          <input class="form-check-input" id="plate" name="Plate" type="checkbox" value="Plate" [(ngModel)]="plateCheckbox" (change)="selectPlate()">
          <label class="form-check-label" for="plate">Plate</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" id="chain" name="Chain" type="checkbox" value="Chain" [(ngModel)]="chainCheckbox" (change)="selectChain()">
          <label class="form-check-label" for="chain">Chain</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" id="leather" name="Leather" type="checkbox" value="Leather" [(ngModel)]="leatherCheckbox" (change)="selectLeather()">
          <label class="form-check-label" for="leather">Leather</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" id="silk" name="Silk" type="checkbox" value="Silk" [(ngModel)]="silkCheckbox" (change)="selectSilk()">
          <label class="form-check-label" for="silk">Silk</label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <h6 class="text-muted text-uppercase fw-semibold mb-2">Fighter Type</h6>
      <div class="d-flex flex-wrap gap-3">
        <div class="form-check">
          <input class="form-check-input" id="melee" name="Melee" type="checkbox" value="Melee" [(ngModel)]="meleeCheckBox" (change)="selectMelee()">
          <label class="form-check-label" for="melee">Melee</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" id="healer" name="Healer" type="checkbox" value="Healer" [(ngModel)]="healerCheckBox" (change)="selectHealer()">
          <label class="form-check-label" for="healer">Healer</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" id="caster" name="Caster" type="checkbox" value="Caster" [(ngModel)]="casterCheckBox" (change)="selectCaster()">
          <label class="form-check-label" for="caster">Caster</label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <h6 class="text-muted text-uppercase fw-semibold mb-2">Class</h6>
      <div class="d-flex flex-wrap gap-3">
        <div *ngFor="let selected of classCheckbox" class="form-check">
          <input class="form-check-input" [name]="selected.name" [id]="'cls-' + selected.value" type="checkbox" [value]="selected.value" [(ngModel)]="selected.checked">
          <label class="form-check-label" [for]="'cls-' + selected.value">{{selected.value}}</label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <h6 class="text-muted text-uppercase fw-semibold mb-2">Slot</h6>
      <div class="d-flex flex-wrap gap-3">
        <div *ngFor="let s of slotCheckBox" class="form-check">
          <input class="form-check-input" [name]="s.slotName" [id]="'slot-' + s.slotName" type="checkbox" [value]="s.slotName" [(ngModel)]="s.checked">
          <label class="form-check-label" [for]="'slot-' + s.slotName">{{s.slotName}}</label>
        </div>
      </div>
    </div>

    <button class="btn btn-success" type="button" (click)="search()">Search</button>

  </div>
</div>

<ng-container *ngIf="characterArmorSlots$ | async as slots; else loading">
  <div *ngIf="error" class="alert alert-danger">{{error}}</div>
  <p *ngIf="!error && slots.length === 0" class="text-muted fst-italic">No armor found for the selected filters.</p>
  <div *ngIf="slots.length > 0" class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Character</th>
            <th>Armor</th>
            <th>HP</th>
            <th>Mana</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of slots">
            <td class="fw-semibold">{{c.character.name}}</td>
            <td>{{c.armor.name}}</td>
            <td>{{c.armor.hitPoints}}</td>
            <td>{{c.armor.manaPoints}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</ng-container>
<ng-template #loading>
  <div class="d-flex justify-content-center my-4">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</ng-template>
